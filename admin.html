<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuyeon Admin | 대시보드</title>
    <style>
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; padding: 20px; text-align: center; }
        .admin-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 20px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Studio Yuyeon Admin</h1>
        <p id="status-display" style="font-weight: bold; font-size: 18px;">상태 확인 중...</p>
        <div class="btn-group">
            <button id="open-btn" style="background:#9b59b6;">🔓 결과 공개 (접수 마감)</button>
            <button id="close-btn" style="background:#34495e;">🔒 결과 차단 (접수 재개)</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { /* 위와 동일한 설정 사용 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusText = document.getElementById('status-display');

        // 실시간으로 현재 상태를 화면에 표시합니다.
        onSnapshot(doc(db, "settings", "matching_status"), (doc) => {
            if (doc.exists() && doc.data().is_open === true) {
                statusText.innerText = "🔴 현재 상태: 접수 마감 (결과 공개 중)";
                statusText.style.color = "red";
            } else {
                statusText.innerText = "🟢 현재 상태: 접수 중";
                statusText.style.color = "green";
            }
        });

        document.getElementById('open-btn').onclick = async () => {
            if(!confirm("마감하시겠습니까?")) return;
            // 반드시 불리언 값인 true를 저장합니다.
            await setDoc(doc(db, "settings", "matching_status"), { is_open: true });
            alert("접수가 마감되었습니다.");
        };

        document.getElementById('close-btn').onclick = async () => {
            await setDoc(doc(db, "settings", "matching_status"), { is_open: false });
            alert("접수가 재개되었습니다.");
        };
    </script>
</body>
</html>
