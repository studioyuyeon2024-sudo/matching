<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Yuyeon Admin | 🔐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .admin-container { width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 30px; border-top: 6px solid #1A237E; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; }
        
        /* 로그인 섹션 */
        #login-section { width: 100%; max-width: 400px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; margin-top: 10vh; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #1A237E; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* 대시보드 디자인 */
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .bento-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid #f0f0f0; text-align: left; }
        .card-large { grid-column: span 2; grid-row: span 2; border-top: 5px solid #FF5252; }
        .main-val { font-size: 36px; font-weight: bold; color: #1A237E; margin: 10px 0; }
        
        .control-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .panel-btn { padding: 18px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-purple { background: #9b59b6; } .btn-dark { background: #34495e; } .btn-orange { background: #f39c12; } .btn-red { background: #e74c3c; } .btn-green { background: #27ae60; grid-column: span 2; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 15px; border: 1px solid #f9f9f9; text-align: center; }
        th { background: #1A237E; color: white; }
    </style>
</head>
<body>
    <div id="login-section">
        <h1 style="font-family: 'Playfair Display'; color: #1A237E; margin-bottom: 30px;">Admin Login</h1>
        <input type="email" id="email" class="login-input" placeholder="이메일 주소">
        <input type="password" id="password" class="login-input" placeholder="비밀번호">
        <button id="login-btn" class="login-btn">로그인</button>
    </div>

    <div class="admin-container" id="admin-main">
        <h1 style="font-family: 'Playfair Display'; text-align: center; color: #1A237E;">Studio Yuyeon Admin</h1>
        <div class="bento-grid">
            <div class="bento-card card-large">
                <h4>실시간 매칭 성공 💖</h4>
                <p id="stat-couples" class="main-val" style="color:#FF5252;">0쌍</p>
                <div id="match-summary" style="font-size: 13px; color: #555; line-height: 1.8;"></div>
            </div>
            <div class="bento-card" style="grid-column: span 2; border-top: 5px solid #1A237E;"><h4>매칭률 📊</h4><p id="stat-rate" class="main-val">0%</p></div>
            <div class="bento-card" style="border-top: 5px solid #27ae60;"><h4>총 참가자</h4><p id="stat-total" class="main-val">0명</p></div>
            <div class="bento-card" style="border-top: 5px solid #f39c12;"><h4>성비 (남/여)</h4><p id="stat-gender" class="main-val" style="font-size: 20px;">0 / 0</p></div>
        </div>

        <div class="control-panel">
            <button id="open-btn" class="panel-btn btn-purple">🔓 결과 공개 (이중 확인)</button>
            <button id="close-btn" class="panel-btn btn-dark">🔒 결과 차단 (접수 재개)</button>
            <button id="download-btn" class="panel-btn btn-orange">📥 명단 CSV 다운로드</button>
            <button id="delete-btn" class="panel-btn btn-red">⚠️ 자동 백업 후 초기화</button>
            <button id="refresh-btn" class="panel-btn btn-green">🔄 데이터 새로고침</button>
        </div>

        <div style="overflow-x: auto; border-radius: 20px; border: 1px solid #eee;">
            <table>
                <thead><tr><th>#</th><th>성별</th><th>이름</th><th>연락처</th><th>픽</th><th>득표 🔥</th><th>후기</th></tr></thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI",
            authDomain: "my-dating-service.firebaseapp.com",
            projectId: "my-dating-service",
            storageBucket: "my-dating-service.firebasestorage.app",
            messagingSenderId: "231488184905",
            appId: "1:231488184905:web:d49b3e4f0ef35e524e5598"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentData = [];

        // 로그인 처리
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (e) { alert("로그인 실패: 정보를 확인하세요."); }
        };

        // 인증 상태 감시
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-main').style.display = 'block';
                updateDashboard();
            }
        });

        async function updateDashboard() {
            const snap = await getDocs(collection(db, "participants"));
            currentData = []; snap.forEach(d => currentData.push({ id: d.id, ...d.data() }));
            
            const voteMap = {};
            currentData.forEach(p => { 
                if(p.pickId1) voteMap[p.pickId1] = (voteMap[p.pickId1]||0)+1; 
                if(p.pickId2) voteMap[p.pickId2] = (voteMap[p.pickId2]||0)+1; 
            });

            const listBody = document.getElementById('list-body');
            listBody.innerHTML = "";
            currentData.sort((a,b)=>a.myId - b.myId).forEach(p => {
                listBody.innerHTML += `<tr><td>${p.myId}</td><td>${p.gender=='male'?'남':'여'}</td><td>${p.realName}</td><td>${p.phone}</td><td>${p.pickId1||'-'},${p.pickId2||'-'}</td><td style="font-weight:bold; color:#FF5252;">${voteMap[p.myId]||0}</td><td style="text-align:left;">${p.review||'-'}</td></tr>`;
            });

            const males = currentData.filter(p => p.gender === 'male');
            const females = currentData.filter(p => p.gender === 'female');
            const summary = document.getElementById('match-summary');
            summary.innerHTML = "";
            let couples = 0; let matchedIds = new Set();

            males.forEach(m => {
                females.forEach(f => {
                    if ([m.pickId1, m.pickId2].includes(f.myId) && [f.pickId1, f.pickId2].includes(m.myId)) {
                        couples++; matchedIds.add(m.myId); matchedIds.add(f.myId);
                        summary.innerHTML += `<div>💘 <b>${m.myId}(${m.realName})</b> ↔ <b>${f.myId}(${f.realName})</b></div>`;
                    }
                });
            });

            document.getElementById('stat-couples').innerText = `${couples}쌍`;
            document.getElementById('stat-total').innerText = `${currentData.length}명`;
            document.getElementById('stat-gender').innerText = `${males.length} / ${females.length}`;
            document.getElementById('stat-rate').innerText = `${currentData.length>0?Math.round((matchedIds.size/currentData.length)*100):0}%`;
        }

        document.getElementById('open-btn').onclick = async () => {
            if(!confirm("진짜 결과를 공개하시겠습니까? 공개 시 참여자들의 접수가 즉시 마감됩니다.")) return;
            await setDoc(doc(db, "settings", "matching_status"), { is_open: true });
            alert("공개 및 마감 완료!");
        };

        document.getElementById('delete-btn').onclick = async () => {
            if(!confirm("⚠️ 모든 데이터를 삭제하시겠습니까? 삭제 전 자동으로 'archive' 컬렉션에 저장됩니다.")) return;
            const batchName = prompt("저장할 기수 이름을 입력하세요 (예: 유연 14기)");
            if(!batchName) return alert("기수 이름 필수!");

            const batch = writeBatch(db);
            currentData.forEach(p => {
                const archiveRef = doc(db, "archive", `${batchName}_${p.myId}_${p.phone}`);
                batch.set(archiveRef, { ...p, batchName: batchName, archivedAt: new Date() });
                batch.delete(doc(db, "participants", p.id));
            });
            await batch.commit();
            alert(`${batchName} 백업 및 초기화 완료!`);
            updateDashboard();
        };

        document.getElementById('download-btn').onclick = () => {
            let csv = "\uFEFF번호,성별,이름,연락처,픽1,픽2,후기\n";
            currentData.forEach(p => csv += `${p.myId},${p.gender},${p.realName},${p.phone},${p.pickId1||''},${p.pickId2||''},"${(p.review||'').replace(/"/g, '""')}"\n`);
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `백업_${new Date().toLocaleDateString()}.csv`; link.click();
        };

        document.getElementById('refresh-btn').onclick = updateDashboard;
    </script>
</body>
</html>
