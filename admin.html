<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuyeon Admin | 대시보드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; padding: 20px; }
        .admin-container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 30px; border-top: 6px solid #1A237E; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="font-family: 'Playfair Display'; text-align: center;">Studio Yuyeon Admin</h1>
        <div class="btn-group">
            <button id="open-btn" style="background:#9b59b6;">🔓 결과 공개 (접수 마감)</button>
            <button id="close-btn" style="background:#34495e;">🔒 결과 차단 (접수 재개)</button>
        </div>
        <p id="status-text" style="text-align: center; font-weight: bold; color: #1A237E;">현재 상태 확인 중...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { /* 이전과 동일한 설정 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 실시간 상태 감시
        onSnapshot(doc(db, "settings", "matching_status"), (doc) => {
            const statusText = document.getElementById('status-text');
            if (doc.exists() && doc.data().is_open) {
                statusText.innerText = "🔴 현재 상태: 결과 공개 (접수 불가)";
                statusText.style.color = "#FF5252";
            } else {
                statusText.innerText = "🟢 현재 상태: 접수 중 (제출 가능)";
                statusText.style.color = "#27ae60";
            }
        });

        document.getElementById('open-btn').onclick = async () => {
            if(!confirm("진짜 공개하시겠습니까? 접수가 즉시 마감됩니다.")) return;
            await setDoc(doc(db, "settings", "matching_status"), { is_open: true });
            alert("공개 완료 (접수 마감)");
        };

        document.getElementById('close-btn').onclick = async () => {
            if(!confirm("접수를 다시 받으시겠습니까?")) return;
            await setDoc(doc(db, "settings", "matching_status"), { is_open: false });
            alert("차단 완료 (접수 재개)");
        };
    </script>
</body>
</html>
